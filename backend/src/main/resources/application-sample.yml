# =============================================================================
# Taarifu backend — SAMPLE environment configuration (documentation only).
#
# Copy the values below into your shell/secret manager (NOT into a committed file).
# This file contains NO real secrets — only documented placeholders (PRD §18,
# CLAUDE.md §12). application.yml reads all of these via ${VAR} env placeholders.
#
# Generate a dev crypto key (Base64 256-bit):
#   openssl rand -base64 32
# Generate a JWT secret (HMAC, >=256-bit):
#   openssl rand -base64 48
# =============================================================================

# --- Database (PostgreSQL 16 + PostGIS 3.4) ---
# TAARIFU_DB_URL=jdbc:postgresql://localhost:5432/taarifu
# TAARIFU_DB_USER=taarifu
# TAARIFU_DB_PASSWORD=<set-in-env>

# --- JWT (ADR-0007 / ADR-0011) ---
# Boot FAILS FAST if TAARIFU_JWT_SECRET is absent or < 256-bit (MF-1) — set a strong value.
# TAARIFU_JWT_SECRET=<output of: openssl rand -base64 48>
# TAARIFU_JWT_ISSUER=taarifu
# TAARIFU_JWT_AUDIENCE=taarifu-clients   # validated on verify (MF-1)

# --- OTP (AUTH-DESIGN §9) ---
# TAARIFU_OTP_TTL_SECONDS=300            # 5-minute single-use OTP lifetime

# --- Staff TOTP / MFA (N-4, VERIFICATION-DESIGN §7) ---
# TAARIFU_MFA_TOTP_STEP_SECONDS=30       # RFC 6238 TOTP step (authenticator default)
# TAARIFU_MFA_CHALLENGE_TTL_SECONDS=300  # MFA_CHALLENGE token TTL (~5 min, two-step staff login)

# --- Identity verification + electoral (D-Q2 / D13, VERIFICATION-DESIGN §4-§6) ---
# TAARIFU_VERIFICATION_PROVIDER=operator-assisted  # or 'auto-stub' (dev/E2E); no NIDA dependency at launch
# TAARIFU_ELECTORAL_COOLDOWN_DAYS=183    # ~6-month manual isElectoral change cooldown (voter-ID bypasses)

# --- CORS allow-list (PRD §18) ---
# Comma-separated EXACT origins. Never use '*' with credentials.
# TAARIFU_CORS_ORIGINS=https://admin.taarifu.example,https://app.taarifu.example

# --- Field-level PII encryption dev key (EI-19) ---
# TAARIFU_CRYPTO_DEV_KEY=<output of: openssl rand -base64 32>

# --- Geocoder adapter selection ---
# 'postgis' (default; requires seeded ward boundaries) or 'stub' (dev/test, no geometry needed).
# TAARIFU_GEOCODER=postgis

# --- Communications channels (PRD §21 EI-3/5/6) ---
# Each channel defaults to the safe LOGGING stub (no external calls). Set the provider AND its
# required endpoints to enable a real adapter. Secrets are env/secret-mount only — NEVER committed.
#
# SMS (HTTPS-submit aggregator). When provider=http, submit-url + sender-id are required.
# TAARIFU_SMS_PROVIDER=http
# TAARIFU_SMS_SUBMIT_URL=https://aggregator.example/sms/submit
# TAARIFU_SMS_SENDER_ID=TAARIFU            # TCRA-registered sender-id / shortcode (D-Q7)
# TAARIFU_SMS_API_KEY=<set-in-env>         # SECRET — aggregator API key, never committed
# TAARIFU_SMS_AUTH_HEADER=Authorization    # or X-API-Key etc. per the aggregator
# TAARIFU_SMS_REQUEST_TIMEOUT=5s
#
# Push (FCM HTTP v1). When provider=fcm, project-id + credentials-file are required.
# TAARIFU_PUSH_PROVIDER=fcm
# TAARIFU_FCM_PROJECT_ID=my-firebase-project
# TAARIFU_FCM_CREDENTIALS_FILE=/var/run/secrets/fcm/service-account.json   # SECRET mount path
# TAARIFU_PUSH_REQUEST_TIMEOUT=5s
#
# Email (Spring Mail / SMTP). When provider=smtp, `from` is required and the SMTP transport comes
# from spring.mail.* (set via SPRING_MAIL_* env). The from address must be SPF/DKIM/DMARC-aligned at the ESP.
# TAARIFU_EMAIL_PROVIDER=smtp
# TAARIFU_EMAIL_FROM=no-reply@taarifu.example
# TAARIFU_EMAIL_FROM_NAME=Taarifu
# TAARIFU_EMAIL_REPLY_TO=support@taarifu.example
# SPRING_MAIL_HOST=smtp.esp.example
# SPRING_MAIL_PORT=587
# SPRING_MAIL_USERNAME=<set-in-env>        # SECRET — SMTP user
# SPRING_MAIL_PASSWORD=<set-in-env>        # SECRET — SMTP password

# Notes:
# - In production, TAARIFU_JWT_SECRET / TAARIFU_CRYPTO_DEV_KEY are replaced by
#   KMS-backed signing keys and KMS envelope encryption respectively (ADR-0007, EI-19).
# - PII (national/voter ID) is encrypted at rest; never log it; honour PDPA 2022/2023.
