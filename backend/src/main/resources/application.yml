# =============================================================================
# Taarifu backend — default application configuration.
#
# Responsibility: safe defaults for every environment. Schema is owned by Flyway
# (ddl-auto=validate, ADR-0005); ALL secrets come from environment variables /
# secret manager via ${VAR} placeholders — NONE are committed (PRD §18, CLAUDE.md §12).
# See application-sample.yml for documented placeholders to copy into a real env.
# =============================================================================
spring:
  application:
    name: taarifu-backend

  # --- Datasource: provided entirely by the environment (no host/user/pass in source). ---
  datasource:
    url: ${TAARIFU_DB_URL:jdbc:postgresql://localhost:5432/taarifu}
    username: ${TAARIFU_DB_USER:taarifu}
    password: ${TAARIFU_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway owns the schema; Hibernate only VALIDATES entities against it and fails fast (ADR-0005).
    hibernate:
      ddl-auto: validate
    open-in-view: false                # no lazy loading in the view layer (clean boundaries)
    properties:
      hibernate:
        jdbc:
          time_zone: UTC               # all timestamps persisted/read as UTC (PRD §15)
        format_sql: false

  # --- Flyway: forward-only, range-partitioned migrations under db/migration (ARCHITECTURE §4.1). ---
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # --- i18n: Swahili default, English secondary (ADR-0010). ---
  messages:
    basename: i18n/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  web:
    locale: sw                         # default request locale = Swahili
    locale-resolver: accept_header     # honour Accept-Language, default to sw

# --- Server: versioned API root /api/v1 (ARCHITECTURE §5.4). ---
server:
  port: ${SERVER_PORT:8081}   # 8081 by default; 8080 left free for other local services. Override via SERVER_PORT.
  servlet:
    context-path: /api/v1
  error:
    include-stacktrace: never          # never leak stack traces to clients (PRD §18)
    include-message: never

# --- Actuator: expose health/info + the metrics scrape surface (ARCHITECTURE §9, deploy/README §10). ---
# `prometheus` + `metrics` are added for the internal Prometheus scraper. These MUST stay reachable
# from the monitoring network ONLY — never published to the public internet (deploy/README §10):
# at the edge, allow /api/v1/actuator/health and /api/v1/actuator/info publicly and restrict
# /api/v1/actuator/{metrics,prometheus} to the scrape subnet (reverse-proxy/network-policy job, NOT app config).
#
# CENTRAL NEED: rendering /actuator/prometheus requires the `micrometer-registry-prometheus` runtime
# dependency on the backend classpath (NOT yet in backend/pom.xml — see report). With only
# spring-boot-starter-actuator present, the `prometheus` endpoint is unavailable even when listed here.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true                  # liveness/readiness groups
      group:
        # Readiness includes external deps (DB/Redis); liveness stays cheap so a slow dep never kills the pod.
        readiness:
          include: readinessState,db
  prometheus:
    metrics:
      export:
        enabled: true
  # Micrometer metric tuning. Percentile histograms for HTTP server timings let Prometheus compute
  # p95/p99 latency SLOs (PRD §15: reads p95 < 500ms, writes p95 < 1s) via histogram_quantile() on
  # the scraped buckets, rather than relying on client-side, non-aggregatable percentiles.
  metrics:
    tags:
      # Stamp every metric with the app so dashboards/alerts can slice per deployment (ARCHITECTURE §9).
      application: taarifu-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        # Buckets aligned to the PRD §15 latency SLOs (ms) so burn can be read straight off the histogram.
        http.server.requests: 250ms,500ms,1s

# --- springdoc / OpenAPI: serve the spec + Swagger UI (paths are relative to context-path). ---
springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /swagger-ui.html

# =============================================================================
# Taarifu-specific configuration (all secrets via env; see application-sample.yml).
# =============================================================================
taarifu:
  security:
    jwt:
      # JWT signing secret MUST come from the environment — no default in source (PRD §18).
      # Boot FAILS FAST if absent or < 256-bit (MF-1, ADR-0011 §10): no forgeable-token startup.
      secret: ${TAARIFU_JWT_SECRET:}
      issuer: ${TAARIFU_JWT_ISSUER:taarifu}
      audience: ${TAARIFU_JWT_AUDIENCE:taarifu-clients}   # aud claim; validated on verify (MF-1)
      access-ttl: PT15M                # ~15 min access token (ADR-0007)
      refresh-ttl: P30D                # ~30 day rotating refresh (ADR-0007)
      clock-skew: PT30S                # tolerated clock skew on exp/nbf (MF-1)
    cors:
      # Explicit allow-list; NEVER wildcard-with-credentials (PRD §18). Empty by default.
      allowed-origins: ${TAARIFU_CORS_ORIGINS:}
    crypto:
      # Base64 256-bit dev key for field-level PII encryption — env-provided, never committed (EI-19).
      dev-key: ${TAARIFU_CRYPTO_DEV_KEY:}
    otp:
      # OTP lifetime in seconds (single-use, attempt-capped). 5 min default (AUTH-DESIGN §9, §25.1).
      ttl-seconds: ${TAARIFU_OTP_TTL_SECONDS:300}
    mfa:
      # Whether the staff TOTP second factor is enforced. MUST stay true in prod (and when unset);
      # set false ONLY for local testing (TAARIFU_MFA_ENFORCED=false) so staff can log in without an
      # authenticator app. Never disable in a real deployment (N-4, VERIFICATION-DESIGN §7).
      enforced: ${TAARIFU_MFA_ENFORCED:true}
      # Staff TOTP second factor (N-4). RFC 6238 step (30s) + MFA_CHALLENGE token TTL (~5 min).
      totp:
        step-seconds: ${TAARIFU_MFA_TOTP_STEP_SECONDS:30}
      challenge:
        ttl-seconds: ${TAARIFU_MFA_CHALLENGE_TTL_SECONDS:300}
  identity:
    verification:
      # Pluggable identity verification (D-Q2): 'operator-assisted' (default, MVP queue) or 'auto-stub'.
      provider: ${TAARIFU_VERIFICATION_PROVIDER:operator-assisted}
    electoral:
      # Manual isElectoral change cooldown in days (~6 months, D13/§25.4); voter-ID set bypasses it.
      cooldown-days: ${TAARIFU_ELECTORAL_COOLDOWN_DAYS:183}
  geography:
    # Active Geocoder adapter: 'postgis' (default, source of truth) or 'stub' (dev/test).
    geocoder: ${TAARIFU_GEOCODER:postgis}
