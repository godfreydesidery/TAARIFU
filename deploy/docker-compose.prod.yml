# =============================================================================
# Taarifu — PRODUCTION-shaped compose (start-lean topology: managed VM + compose,
# grow to Helm/K8s later when load + team justify it — deploy/README §5, PRD §16).
#
# This is the "boring, reversible, well-monitored" single-host deployment:
#   db (Postgres16+PostGIS3.4)  redis(7)  backend(:8081)  prometheus  alertmanager  grafana
#
# DIFFERS from the dev docker-compose.yml at repo root:
#   - Pulls a PRE-BUILT, SCANNED image by immutable tag (no build here) — promote the
#     SAME artefact CI built (deploy/README §5). Rollback = re-pin the previous tag.
#   - Runs the observability stack (deploy/observability/) alongside the app.
#   - ALL secrets come from deploy/.env.prod (NEVER committed; see .env.prod.example).
#   - Actuator metrics/prometheus are exposed to the INTERNAL compose network only;
#     publish ONLY 8081 (and Grafana, behind your own auth/proxy) at the host edge.
#
# RESIDENCY (D-Q9, R12): run this host IN-COUNTRY where feasible; PII (NIDA/voter
# IDs, MSISDN) must not leave the approved jurisdiction. Final placement is a Legal
# sign-off item before prod launch (deploy/README §11). No PII in non-prod (R10).
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod pull
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d
#   # rollback: set TAARIFU_IMAGE to the previous good tag and `up -d` again
# =============================================================================

services:
  # --- PostgreSQL 16 + PostGIS 3.4 — the system of record. ---
  db:
    image: postgis/postgis:16-3.4
    container_name: taarifu-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env.prod}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env.prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
    volumes:
      # Named volume = the durable citizen data. Back it up (RUNBOOK §backup-restore).
      - taarifu-db-data:/var/lib/postgresql/data
    # NOT published to the host: the DB is reachable only on the internal network.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- Redis 7 — OTP / idempotency / USSD session state. ---
  redis:
    image: redis:7-alpine
    container_name: taarifu-redis
    # AOF persistence so OTP/idempotency state survives a restart.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - taarifu-redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # --- Backend (Spring Boot, :8081). PULLED by immutable tag — never built here. ---
  backend:
    image: ${TAARIFU_IMAGE:?set TAARIFU_IMAGE to the scanned image tag, e.g. ghcr.io/<org>/taarifu-backend:<git-sha>}
    container_name: taarifu-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # --- Datasource (internal network) ---
      TAARIFU_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      TAARIFU_DB_USER: ${POSTGRES_USER}
      TAARIFU_DB_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: "8081"
      # --- Required secrets: NO defaults; fail fast if absent (mirrors MF-1). ---
      TAARIFU_JWT_SECRET: ${TAARIFU_JWT_SECRET:?set TAARIFU_JWT_SECRET (>=256-bit) in .env.prod}
      TAARIFU_CRYPTO_DEV_KEY: ${TAARIFU_CRYPTO_DEV_KEY:?set TAARIFU_CRYPTO_DEV_KEY in .env.prod (or wire a real KMS adapter)}
      TAARIFU_JWT_ISSUER: ${TAARIFU_JWT_ISSUER:-taarifu}
      TAARIFU_JWT_AUDIENCE: ${TAARIFU_JWT_AUDIENCE:-taarifu-clients}
      # CORS allow-list — explicit prod origins ONLY, never '*'-with-credentials (PRD §18).
      TAARIFU_CORS_ORIGINS: ${TAARIFU_CORS_ORIGINS:?set TAARIFU_CORS_ORIGINS to the real admin/web origin(s)}
      # Source-of-truth geocoder in prod (seeded ward boundaries).
      TAARIFU_GEOCODER: ${TAARIFU_GEOCODER:-postgis}
      TAARIFU_VERIFICATION_PROVIDER: ${TAARIFU_VERIFICATION_PROVIDER:-operator-assisted}
      # MFA second factor MUST stay enforced in prod (N-4). Do NOT set to false here.
      TAARIFU_MFA_ENFORCED: ${TAARIFU_MFA_ENFORCED:-true}
    # Only the API port is published at the host edge; put TLS + a WAF/reverse proxy
    # in front of this and restrict /actuator/{metrics,prometheus} to the scrape net.
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # --- Prometheus — internal scrape + rule evaluation. ---
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: taarifu-prometheus
    depends_on:
      - backend
    environment:
      TAARIFU_ENV: ${TAARIFU_ENV:-prod}
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - taarifu-prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    expose:
      - "9090"
    restart: unless-stopped

  # --- Alertmanager — routes firing alerts by severity (skeleton receivers). ---
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: taarifu-alertmanager
    volumes:
      - ./observability/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    expose:
      - "9093"
    restart: unless-stopped

  # --- Grafana — dashboards (provisioned). Front it with your own SSO/proxy. ---
  grafana:
    image: grafana/grafana:11.2.0
    container_name: taarifu-grafana
    depends_on:
      - prometheus
    environment:
      # Admin password from the env/secret manager — never a default in prod.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env.prod}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - taarifu-grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_HOST_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  taarifu-db-data:
  taarifu-redis-data:
  taarifu-prometheus-data:
  taarifu-grafana-data:
