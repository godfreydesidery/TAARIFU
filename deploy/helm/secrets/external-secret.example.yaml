# =============================================================================
# EXAMPLE External Secrets Operator (ESO) manifests — Pattern B.
#
# Only the REFERENCE (which store + which keys) is in git — never a secret value.
# ESO reads from the in-country Vault/cloud secret manager and materialises the
# real K8s Secret the Helm chart references by name (PRD §18, deploy/helm/secrets §3).
# =============================================================================
#
# 1) The SecretStore points ESO at your in-country Vault/KMS. Auth to the store is
#    itself a (bootstrap) secret — provision it via the platform's workload identity,
#    NOT a committed token.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: taarifu-vault
  namespace: taarifu-prod
spec:
  provider:
    vault:
      server: "https://vault.internal.taarifu.example:8200"   # in-country Vault
      path: "secret"
      version: "v2"
      auth:
        # Kubernetes auth: ESO authenticates with its ServiceAccount — no static token.
        kubernetes:
          mountPath: "kubernetes"
          role: "taarifu-prod"
          serviceAccountRef:
            name: "external-secrets"
---
# 2) Core backend secrets — ESO syncs Vault keys into the Secret the chart expects.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taarifu-backend-secrets
  namespace: taarifu-prod
spec:
  refreshInterval: 1h            # ESO re-pulls so rotation in Vault propagates (L-3)
  secretStoreRef:
    name: taarifu-vault
    kind: SecretStore
  target:
    name: taarifu-backend-secrets   # <- the chart's backend.secrets.core.existingSecret
    creationPolicy: Owner
  data:
    - secretKey: TAARIFU_JWT_SECRET
      remoteRef:
        key: taarifu/prod/backend
        property: jwt_secret
    - secretKey: TAARIFU_CRYPTO_DEV_KEY
      remoteRef:
        key: taarifu/prod/backend
        property: crypto_dev_key
    - secretKey: TAARIFU_DB_PASSWORD
      remoteRef:
        key: taarifu/prod/db
        property: password
---
# 3) Integration secrets (enable backend.secrets.integrations.enabled to map these).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taarifu-integration-secrets
  namespace: taarifu-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: taarifu-vault
    kind: SecretStore
  target:
    name: taarifu-integration-secrets
    creationPolicy: Owner
  data:
    - secretKey: TAARIFU_SMS_API_KEY
      remoteRef: { key: taarifu/prod/sms, property: api_key }
    - secretKey: TAARIFU_USSD_GATEWAY_SECRET
      remoteRef: { key: taarifu/prod/ussd, property: gateway_secret }
    - secretKey: TAARIFU_MEDIA_SCANNER_SECRET
      remoteRef: { key: taarifu/prod/media, property: scanner_secret }
---
# 4) FCM service-account JSON as a FILE (not env) — mount this Secret as a volume and
#    point TAARIFU_FCM_CREDENTIALS_FILE at the mount path (application.yml push.credentials-file).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: taarifu-fcm-credentials
  namespace: taarifu-prod
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: taarifu-vault
    kind: SecretStore
  target:
    name: taarifu-fcm-credentials
    creationPolicy: Owner
  data:
    - secretKey: service-account.json
      remoteRef: { key: taarifu/prod/fcm, property: service_account_json }
