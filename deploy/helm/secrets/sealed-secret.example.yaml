# =============================================================================
# EXAMPLE SealedSecret (Bitnami Sealed Secrets) — Pattern A.
#
# This is a TEMPLATE showing the SHAPE only. The `encryptedData` values here are
# PLACEHOLDERS, not real ciphertext — generate the real object with `kubeseal`
# (deploy/helm/secrets/README §2) and commit it under secrets/sealed/.
#
# A SealedSecret is SAFE to commit: it is ciphertext that ONLY the in-cluster
# controller's private key can decrypt (D-Q9: the key never leaves the cluster /
# the country). The controller materialises a real Secret named below.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: taarifu-backend-secrets
  namespace: taarifu-prod
spec:
  encryptedData:
    # Replace each value with `kubeseal` output. These strings are NOT valid ciphertext.
    TAARIFU_JWT_SECRET: AgB__REPLACE_WITH_KUBESEAL_CIPHERTEXT__
    TAARIFU_CRYPTO_DEV_KEY: AgB__REPLACE_WITH_KUBESEAL_CIPHERTEXT__
    TAARIFU_DB_PASSWORD: AgB__REPLACE_WITH_KUBESEAL_CIPHERTEXT__
  template:
    metadata:
      name: taarifu-backend-secrets
      namespace: taarifu-prod
    type: Opaque
---
# Integration secrets (only when backend.secrets.integrations.enabled=true).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: taarifu-integration-secrets
  namespace: taarifu-prod
spec:
  encryptedData:
    TAARIFU_SMS_API_KEY: AgB__REPLACE__
    TAARIFU_USSD_GATEWAY_SECRET: AgB__REPLACE__
    TAARIFU_MEDIA_SCANNER_SECRET: AgB__REPLACE__
  template:
    metadata:
      name: taarifu-integration-secrets
      namespace: taarifu-prod
    type: Opaque
