# =============================================================================
# Backend HorizontalPodAutoscaler (PRD §15 scale; capacity headroom for spikes —
# announcement bursts §13, election-period traffic deploy/README §9).
# autoscaling/v2 so we can scale on CPU AND memory with a scale-down stabilisation
# window (avoid flapping under bursty civic traffic).
# =============================================================================
{{- if .Values.backend.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "taarifu.fullname" . }}-backend
  labels:
    {{- include "taarifu.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "taarifu.fullname" . }}-backend
  minReplicas: {{ .Values.backend.hpa.minReplicas }}
  maxReplicas: {{ .Values.backend.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.hpa.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.hpa.targetMemoryUtilizationPercentage }}
  behavior:
    {{- toYaml .Values.backend.hpa.behavior | nindent 4 }}
{{- end }}
