# =============================================================================
# Backend PodDisruptionBudget — keep at least minAvailable pods during VOLUNTARY
# disruptions (node drain / cluster upgrade) so a maintenance window never causes a
# citizen-facing outage (PRD §15 availability 99.9%).
# =============================================================================
{{- if .Values.backend.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "taarifu.fullname" . }}-backend
  labels:
    {{- include "taarifu.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  minAvailable: {{ .Values.backend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "taarifu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
{{- end }}
