# =============================================================================
# Ingress — TLS terminates here (cert-manager). Routes:
#   /api/v1  -> backend Service   (citizen + admin API)
#   /        -> web-admin Service (Angular SPA)
#
# At the edge: allow /api/v1/actuator/health + /info publicly; the actuator
# metrics/prometheus path is restricted to the scrape network by NetworkPolicy
# (deploy/README §10). gzip on for Tanzania's expensive/intermittent data.
# =============================================================================
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "taarifu.fullname" . }}
  labels:
    {{- include "taarifu.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "backend" }}
                name: {{ include "taarifu.fullname" $ }}-backend
                port:
                  number: {{ $.Values.backend.service.port }}
                {{- else }}
                name: {{ include "taarifu.fullname" $ }}-web-admin
                port:
                  number: {{ $.Values.webAdmin.service.port }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
