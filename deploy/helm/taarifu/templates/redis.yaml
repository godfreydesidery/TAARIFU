# =============================================================================
# Redis 7 — OTP / idempotency / USSD session state + the multi-instance limiters
# (application.yml W3-2 / TR-3). Single replica with AOF persistence (state is
# short-TTL and reconstructable; a Redis blip degrades, it does not corrupt).
# =============================================================================
{{- if .Values.redis.deployInCluster }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "taarifu.fullname" . }}-redis
  labels:
    {{- include "taarifu.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    {{- include "taarifu.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "taarifu.fullname" . }}-redis
  labels:
    {{- include "taarifu.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  serviceName: {{ include "taarifu.fullname" . }}-redis
  replicas: 1
  selector:
    matchLabels:
      {{- include "taarifu.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "taarifu.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - redis-server
            {{- if .Values.redis.appendOnly }}
            - --appendonly
            - "yes"
            {{- end }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 15
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "taarifu.labels" . | nindent 10 }}
          app.kubernetes.io/component: redis
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size }}
  {{- end }}
{{- end }}
