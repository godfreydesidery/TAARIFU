# =============================================================================
# Taarifu — Prometheus scrape configuration.
#
# Grounding: ARCHITECTURE.md §9 (Micrometer -> /actuator/prometheus; RED metrics,
# per-adapter dashboards, DLQ-non-empty alert), deploy/README.md §10 (expose the
# metrics scrape INTERNALLY only — never publicly), PRD §15 (SLOs: 99.9% avail,
# reads p95 < 500ms, writes p95 < 1s).
#
# IMPORTANT (residency/PII, R10/R12): Prometheus stores metric TIME SERIES only —
# never request bodies or PII. Keep this scrape on the INTERNAL monitoring network
# (the same in-country footprint as the app); do not ship raw metrics to a foreign
# managed backend without Legal sign-off (D-Q9).
#
# CENTRAL NEED: the backend only EXPOSES /api/v1/actuator/prometheus once the
# `micrometer-registry-prometheus` runtime dependency is on its classpath. Until
# that dep is added to backend/pom.xml this target returns 404 and `up` will be 0.
# =============================================================================

global:
  scrape_interval: 15s          # default scrape cadence (cost vs. resolution balance)
  scrape_timeout: 10s
  evaluation_interval: 15s      # how often alerting/recording rules are evaluated
  external_labels:
    # Stamp the scraping cluster so a federated/global view can tell deployments apart.
    monitor: taarifu
    # Static env label. Prometheus does NOT do shell-style ${VAR} expansion in its config
    # file, so set this per environment by templating/patching this file at deploy time
    # (change to 'staging'/'prod' in the env-specific copy). The compose stack also passes
    # TAARIFU_ENV to the container, but only this literal value is what actually ships.
    env: dev

# Alerting rules live in a sibling file; loaded here so a single Prometheus
# evaluates them. Alertmanager wiring is a separate concern (see alertmanager block).
rule_files:
  - "alerts.yml"

# Alertmanager target. Commented routing belongs to Alertmanager's own config;
# Prometheus only needs to know where to PUSH firing alerts.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # Set to your Alertmanager host:port. Left here as the conventional default
            # so the file is runnable in the bundled compose stack.
            - alertmanager:9093

scrape_configs:
  # ---------------------------------------------------------------------------
  # Taarifu backend (Spring Boot Actuator + Micrometer Prometheus registry).
  # The API runs under context-path /api/v1, so the metrics path is prefixed.
  # ---------------------------------------------------------------------------
  - job_name: taarifu-backend
    metrics_path: /api/v1/actuator/prometheus
    scheme: http                # use https + tls_config in prod behind the internal proxy
    # In prod, prefer service discovery (DNS / k8s) over static targets. Static here
    # so the bundled docker-compose monitoring stack works out of the box.
    static_configs:
      - targets:
          - backend:8081        # compose service name; override per environment
        labels:
          service: taarifu-backend
          component: api
    # The `env` label comes from global.external_labels (set per environment when this
    # file is templated). Keep all series for now; if histogram cardinality grows, add
    # metric_relabel_configs here to drop unused per-URI buckets (ARCHITECTURE §9 cost).

  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring (so we alert if the scraper itself is unhealthy).
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
