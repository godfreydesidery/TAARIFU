  # ===========================================================================
  /ussd/gateway:
    post:
      tags: [USSD]
      summary: USSD aggregator webhook (feature phones)
      description: >
        Server-to-server webhook from the USSD aggregator. Authenticated by a fail-closed
        shared-secret header (`X-Ussd-Secret`), NOT a JWT — a feature-phone caller has no
        token. Per-MSISDN rate-limited. Returns a `text/plain` USSD menu string (CON/END),
        not the JSON envelope. Session state is short-lived in Redis (keyed by MSISDN+sessionId).
      operationId: ussdGateway
      security:
        - ussdSharedSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UssdGatewayRequest' }
      responses:
        '200':
          description: A USSD menu string.
          content:
            text/plain:
              schema: { type: string, example: "CON Karibu Taarifu\n1. Ripoti tatizo\n2. Mwakilishi wangu" }

