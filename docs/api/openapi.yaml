  /admin/users/{userPublicId}/roles:
    post:
      tags: [Admin]
      summary: Grant a role (additive; not-self)
      description: >
        Roles are additive on the one account (a citizen who becomes an MP keeps the same
        login + verified identity and gains REPRESENTATIVE). Cannot grant to self
        (`@taarifuAuthz.isNotSelf`). ADMIN/ROOT.
      operationId: grantRole
      parameters: [ { $ref: '#/components/parameters/UserPublicId' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/GrantRoleRequest' } } } }
      responses:
        '200':
          description: data = RoleGrantedDto.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '403': { $ref: '#/components/responses/ConflictOfInterest' }

  /admin/users/{userPublicId}/roles/{assignmentId}:
    delete:
      tags: [Admin]
      summary: Revoke a role assignment (not-self)
      operationId: revokeRole
      parameters:
        - { $ref: '#/components/parameters/UserPublicId' }
        - name: assignmentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/users/{userPublicId}/suspend:
