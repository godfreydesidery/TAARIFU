        '200': { $ref: '#/components/responses/Success' }

  /admin/reports:
    get:
      tags: [Admin]
      summary: List all reports (ADMIN/MODERATOR oversight)
      operationId: adminListReports
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/Size' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/stats:
    get:
      tags: [Admin]
      summary: Report oversight stats (ADMIN/MODERATOR)
      operationId: adminReportStats
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/dashboard/stats:
    get:
      tags: [Admin]
      summary: Admin dashboard stats (ADMIN/ROOT)
      operationId: dashboardStats
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/config/app:
    get:
      tags: [Admin]
      summary: List app configs (ADMIN/ROOT)
      operationId: listAppConfigs
      responses:
        '200': { $ref: '#/components/responses/Success' }
    put:
      tags: [Admin]
      summary: Upsert an app config (force-update / min-version)
      operationId: upsertAppConfig
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/config/flags:
    get:
      tags: [Admin]
      summary: List feature flags (ADMIN/ROOT)
      operationId: listFeatureFlags
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      tags: [Admin]
      summary: Upsert a feature flag (ADMIN/ROOT)
      operationId: upsertFeatureFlag
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/outbox/failed:
    get:
      tags: [Admin]
      summary: List FAILED outbox events (the DLQ; ADMIN/ROOT)
      operationId: listFailedOutbox
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/Size' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /admin/outbox/replay:
    post:
      tags: [Admin]
