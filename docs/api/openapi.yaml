openapi: 3.1.0

# =============================================================================
# Taarifu API — OpenAPI 3.1 contract (DOCS).
#
# Hand-authored, human-readable description of the Taarifu backend REST surface.
# It is the contract documentation companion to the springdoc-generated spec
# served live at /api/v1/openapi.json (+ Swagger UI at /api/v1/swagger-ui.html).
# Source of truth is the code; this file is curated for onboarding and review.
#
# Grounding:
#   - ARCHITECTURE.md §5 (single ApiResponse envelope, error model, pagination,
#     versioning/idempotency/concurrency), §6 (security: JWT, tiers, scopes).
#   - PRD §17 (API), §18 (security/privacy), §7 (RBAC + trust tiers).
#   - ADR-0007 (JWT auth), ADR-0008 (envelope + outbox), ADR-0010 (i18n),
#     ADR-0011 (auth/MFA), ADR-0013/0014 (cross-module + outbox).
#   - The @RestController classes across all 16 modules (read June 2026).
#
# Conventions captured here:
#   - EVERY response (success and error) is wrapped in the single ApiResponse
#     envelope. Schemas named *Dto are the SHAPE OF `data`, never the raw body.
#   - All paths are relative to the server root `/api/v1` (servlet context-path).
#   - Public UUIDs in path params; internal Long PKs are never exposed.
#   - Swahili is the default response language; Accept-Language: en switches.
# =============================================================================

info:
  title: Taarifu API
  version: v1
  description: >
    Tanzania civic-engagement platform — backend API (Spring Boot modular monolith,
    16 modules under `com.taarifu.*`). Swahili-first, mobile-first, inclusive of
    feature phones (USSD/SMS).


    **One envelope.** Every response — success or error — is the
    [`ApiResponse`](#/components/schemas/ApiResponse) shape: `{ success, statusCode,
    message, data, meta, timestamp }`. The schemas suffixed `*Dto` below describe the
    shape carried in `data`; they are never returned bare.


    **Tiered identity.** Trust tiers gate actions: phone/OTP → **T1**; complete
    profile + verified email/phone → **T2**; NIDA/voter-ID verified (operator-assisted)
    → **T3**. The live tier is resolved server-side per request (never trusted from the
    JWT claim) and high-stakes actions carry `x-required-tier`.


    **Public vs authenticated.** Civic reference data (geography, representatives,
    issue categories, the public reports near-me list, responder directory, published
    announcements, and the engagement read surface) is readable without a token. Filing
    reports, following, signing petitions, rating representatives, all `/me/*` resources,
    and every admin/moderation surface require authentication plus the relevant role/tier.


    **Integrity fence (D18).** Binding civic actions (file report, sign petition, rate a
    representative, vote in a binding poll) are gated on **tier + electoral scope +
    one-per-person only** — never on a token balance. Tokens never buy democratic weight.
  contact:
    name: Taarifu Engineering
    email: engineering@taarifu.example
  license:
    name: Proprietary

servers:
  - url: /api/v1
    description: Versioned API root (servlet context-path). Local dev http://localhost:8081/api/v1

externalDocs:
  description: Developer onboarding guide
  url: ../DEVELOPER-GUIDE.md

# -----------------------------------------------------------------------------
# Tags — one per endpoint group / module.
# -----------------------------------------------------------------------------
tags:
  - name: Auth
    description: >
      Signup (OTP → T1), login (password or OTP), staff TOTP MFA second factor,
      refresh-token rotation, logout. Token-minting endpoints are public; logout
      requires authentication. ADR-0011 / AUTH-DESIGN §14.1.
  - name: Profile & Identity
    description: >
      The caller's own profile (`/profiles/me/*`), tier progression (T1→T2),
      email-OTP verification, pinned locations (primary + electoral), and
      government-ID verification submission (T2→T3, operator-assisted).
  - name: Geography
    description: >
      Public civic geography reference — Mkoa→Wilaya→Halmashauri→Kata→Kijiji/Mtaa,
      constituencies (Jimbo), GPS→ward resolution. Read-only, no token required.
  - name: Institutions
    description: >
      Representatives directory (Mbunge/Diwani via find-my-rep by ward), parties,
      parliaments. Public reads; admin authoring under `/admin/institutions`.
  - name: Reporting
    description: >
      File and track citizen issue reports (the M-MVP core loop), report timeline,
      comments, resolution confirm/dispute. Issue-category catalogue.
  - name: Public Reports
    description: >
      Public near-me reports list/map — PUBLIC reports only, projected to a PII-free
      DTO (no reporter id, no precise geo-point). Unauthenticated.
  - name: Responders
    description: >
      Government/parastatal/private responder + organisation directory (public), and
      the responder workspace (assign / start / resolve / escalate) + routing-rule and
      organisation administration.
  - name: Engagement
    description: >
      Petitions (sign = T3 binding act), surveys/polls (respond = T3), Q&A questions
      (ask = T2). Public read surface; binding writes are tier-gated + electorally scoped.
  - name: Accountability
    description: >
      Public representative accountability reads (contributions, attendance, promises,
      rating summary), rating submission (T3, electoral scope), and admin curation.
  - name: Communications
    description: >
      Personal feed, announcements (publish by representatives/responders/admin),
      follow/subscriptions, notifications, notification preferences.
  - name: Tokens
    description: >
      The caller's wallet + ledger (free-quota economy; no money movement in MVP) and
      admin token-economy config (action costs, rewards). Tokens never gate binding actions.
  - name: Moderation
    description: >
      Flag content (T1), moderator queue + actions, appeals + appeal decisions, and the
      operator-assisted ID-verification review queue.
  - name: Media
    description: >
      Pre-signed object-store upload tickets, download URLs, and the malware-scan callback.
  - name: USSD
    description: >
      Feature-phone aggregator webhook (server-to-server, shared-secret authenticated;
      returns text/plain USSD menus, not the JSON envelope).
  - name: Admin
    description: >
      Admin console surface — user management + additive role grants, reports oversight,
      dashboards, app/feature-flag config, outbox DLQ replay. Role-gated (ADMIN/ROOT/MODERATOR).
  - name: Analytics
    description: >
      Admin KPI/SLA/funnel dashboards (report volume, TTFR, TTR, SLA breaches,
      verification funnel, channel mix). ADMIN-only.

# -----------------------------------------------------------------------------
# Default security: bearer JWT. Public operations override with `security: []`.
# -----------------------------------------------------------------------------
security:
  - bearerAuth: []

paths:

  # ===========================================================================
  # AUTH
  # ===========================================================================
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request a signup OTP
      description: >
        Sends a one-time code to the supplied phone for signup. Always responds `202`
        with a challenge id (anti-enumeration — never reveals whether the phone exists).
        The code is delivered out-of-band (SMS, with email fallback) and never appears in
        the response (S-4). Rate-limited / lockout-protected (S-2).
      operationId: requestSignupOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequestDto' }
      responses:
        '202':
          description: Challenge accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
                # data: OtpChallengeDto
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/signup:
    post:
      tags: [Auth]
      summary: Complete signup (verify OTP → create T1 account)
      description: Verifies the signup OTP, creates/activates a T1 account, and issues the first token pair.
      operationId: completeSignup
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyOtpDto' }
      responses:
        '201':
          description: Account created; tier + token pair returned (data = AuthResultDto).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login/otp/request:
    post:
      tags: [Auth]
      summary: Request a login OTP (passwordless / recovery)
      operationId: requestLoginOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequestDto' }
      responses:
        '202':
          description: Challenge accepted (data = OtpChallengeDto).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /auth/login/password:
    post:
      tags: [Auth]
      summary: Login with phone/email + password
      description: >
        For a citizen account, returns a token pair. For a **staff account**
        (MODERATOR/ADMIN/ROOT) returns `mfaRequired=true` + an `mfaToken` — no token pair
        is issued here; the second factor must be completed at `/auth/login/totp` (N-4).
      operationId: loginWithPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordLoginDto' }
      responses:
        '200':
          description: Login outcome (data = LoginResultDto — a token pair, or an MFA challenge).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /auth/login/otp:
    post:
      tags: [Auth]
      summary: Login by verifying an OTP
      operationId: loginWithOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyOtpDto' }
      responses:
        '200':
          description: Login outcome (data = LoginResultDto).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /auth/login/totp:
    post:
      tags: [Auth]
      summary: Staff MFA second factor (exchange MFA challenge + TOTP for tokens)
      description: >
        Exchanges the `MFA_CHALLENGE` token (from `/auth/login/password`) plus a 6-digit
        TOTP code for the real token pair. Public — it carries the challenge token, not a
        prior access token (N-4).
      operationId: loginWithTotp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TotpLoginDto' }
      responses:
        '200':
          description: Token pair (data = TokenPairDto).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate the refresh token
      description: >
        Single-use rotation. Reuse of a consumed refresh token revokes the whole token
        family (reuse-detection, S-3).
      operationId: refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequestDto' }
      responses:
        '200':
          description: New token pair (data = TokenPairDto).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout this session (revoke one refresh token)
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequestDto' }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/logout/all:
    post:
      tags: [Auth]
      summary: Logout everywhere (revoke all refresh families for the caller)
      operationId: logoutAll
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/mfa/totp/setup:
    post:
      tags: [Auth]
      summary: Provision a TOTP secret (staff enrolment)
      description: Returns the `otpauth://` URI + raw secret **once** (shown once; never logged).
      operationId: setupTotp
      responses:
        '200':
          description: Enrolment material (data = TotpSetupDto).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  /auth/mfa/totp/activate:
    post:
      tags: [Auth]
      summary: Activate MFA (verify a TOTP code against the pending secret)
      operationId: activateTotp
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TotpCodeDto' }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Unauthenticated' }

  # ===========================================================================
  # PROFILE & IDENTITY
  # ===========================================================================
  /profiles/me:
    get:
      tags: [Profile & Identity]
      summary: Get my profile snapshot
      description: Returns the caller's own profile. Never returns another user's PII.
      operationId: getMe
      responses:
        '200':
          description: data = MeDto.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '401': { $ref: '#/components/responses/Unauthenticated' }
    patch:
      tags: [Profile & Identity]
      summary: Complete my profile (may promote T1→T2)
      operationId: updateMe
      parameters: [ { $ref: '#/components/parameters/RequiredTierT1' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileDto' }
      responses:
        '200':
          description: Recomputed tier (data = { tier }).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '403': { $ref: '#/components/responses/TierTooLow' }

  /profiles/me/tier:
    get:
      tags: [Profile & Identity]
      summary: Get my live trust tier (UI hint; same resolver used for gating)
      operationId: getMyTier
      responses:
        '200':
          description: data = { tier }.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /profiles/me/email/otp:
    post:
      tags: [Profile & Identity]
      summary: Request an email-verification OTP (T2 path)
      operationId: requestEmailOtp
      parameters: [ { $ref: '#/components/parameters/RequiredTierT1' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailOtpRequestDto' }
      responses:
        '202':
          description: data = OtpChallengeDto.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /profiles/me/email/verify:
    post:
      tags: [Profile & Identity]
      summary: Verify the email OTP (may promote to T2)
      operationId: verifyEmailOtp
      parameters: [ { $ref: '#/components/parameters/RequiredTierT1' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyOtpDto' }
      responses:
        '200':
          description: Recomputed tier (data = { tier }).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /profiles/me/verification:
    post:
      tags: [Profile & Identity]
      summary: Submit a government ID for verification (T2→T3)
      description: >
        Submits a NIDA/voter ID for operator-assisted verification (NIDA API is a
        pluggable adapter; operator-assisted is the launch default). The `idNo` is
        field-encrypted and never echoed; dedup-guarded (one person = one account, D15).
        Creates a `PENDING` request reviewed in the moderation verification queue.
      operationId: submitVerification
      parameters: [ { $ref: '#/components/parameters/RequiredTierT2' } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmitVerificationDto' }
      responses:
        '202':
          description: data = VerificationStatusDto (reference + PENDING).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
        '403': { $ref: '#/components/responses/TierTooLow' }
        '409': { $ref: '#/components/responses/DuplicateIdentity' }

  /profiles/me/locations:
    post:
      tags: [Profile & Identity]
      summary: Pin a residence location (derives admin + electoral chains)
      description: >
        A citizen pins ONE physical place; the system derives both the administrative and
        the electoral chain — citizens never type a Jimbo. Respects `isPrimary` (one) and
        `isElectoral` (one, voter-ID-authoritative).
      operationId: addMyLocation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddLocationDto' }
      responses:
        '201':
          description: data = ProfileLocationDto.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }
    get:
      tags: [Profile & Identity]
      summary: List my pinned locations
      operationId: listMyLocations
      responses:
        '200':
          description: data = ProfileLocationDto[].
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiResponse' }

  /profiles/me/locations/{publicId}:
    delete:
      tags: [Profile & Identity]
      summary: Remove a pinned location
      operationId: deleteMyLocation
      parameters: [ { $ref: '#/components/parameters/PublicId' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /profiles/me/locations/{publicId}/primary:
    patch:
      tags: [Profile & Identity]
      summary: Set a location as primary (exactly one)
      operationId: setPrimaryLocation
      parameters: [ { $ref: '#/components/parameters/PublicId' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /profiles/me/locations/{publicId}/electoral:
    patch:
      tags: [Profile & Identity]
      summary: Set a location as electoral (rate-limited + audited)
      description: >
        Manual change of the electoral location is rate-limited (≈6-month cooldown) and
        audited; a voter-ID-set electoral location bypasses the cooldown. Binding civic
        actions scope to this electoral location (D13).
      operationId: setElectoralLocation
      parameters: [ { $ref: '#/components/parameters/PublicId' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '429': { $ref: '#/components/responses/RateLimited' }

  # ===========================================================================
  # GEOGRAPHY  (all public reads)
  # ===========================================================================
  /regions:
    get:
      tags: [Geography]
      summary: List regions (Mikoa)
      operationId: listRegions
      security: []
      parameters: [ { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/Size' }, { $ref: '#/components/parameters/Sort' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /regions/{regionId}:
    get:
      tags: [Geography]
      summary: Get one region
      operationId: getRegion
      security: []
      parameters: [ { $ref: '#/components/parameters/RegionId' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }

  /regions/{regionId}/districts:
    get:
      tags: [Geography]
      summary: List a region's districts (Wilaya)
      operationId: listDistrictsOfRegion
      security: []
      parameters: [ { $ref: '#/components/parameters/RegionId' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /districts/{districtId}/wards:
    get:
      tags: [Geography]
      summary: List a district's wards (Kata)
      operationId: listWardsOfDistrict
      security: []
      parameters:
        - name: districtId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /wards:
    get:
      tags: [Geography]
      summary: Search wards (Kata)
      operationId: searchWards
      security: []
      parameters: [ { $ref: '#/components/parameters/Query' }, { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/Size' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /constituencies/{constituencyId}:
    get:
      tags: [Geography]
      summary: Get a constituency (Jimbo)
      operationId: getConstituency
      security: []
      parameters:
        - name: constituencyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }

  /locations/{locationId}:
    get:
      tags: [Geography]
      summary: Get any location node by id
      operationId: getLocation
      security: []
      parameters:
        - name: locationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }

  /locations/resolve:
    get:
      tags: [Geography]
      summary: Resolve GPS to a ward (PostGIS point-in-polygon)
      description: >
        In-house PostGIS resolution against seeded ward boundaries (the source of truth,
        vendor-independent). Absence of boundary geometry degrades to manual ward drill-down.
      operationId: resolveLocation
      security: []
      parameters:
        - { name: lat, in: query, required: true, schema: { type: number, format: double } }
        - { name: lng, in: query, required: true, schema: { type: number, format: double } }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  # ===========================================================================
  # INSTITUTIONS
  # ===========================================================================
  /representatives/by-ward/{wardId}:
    get:
      tags: [Institutions]
      summary: Find-my-rep — representatives for a ward (Mbunge + Diwani)
      operationId: representativesByWard
      security: []
      parameters:
        - name: wardId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /representatives/{representativeId}:
    get:
      tags: [Institutions]
      summary: Get a representative profile (shown factually, not endorsed)
      operationId: getRepresentative
      security: []
      parameters: [ { $ref: '#/components/parameters/RepresentativeId' } ]
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/NotFound' }

  /parties/{partyId}:
    get:
      tags: [Institutions]
      summary: Get a political party
      operationId: getParty
      security: []
      parameters:
        - name: partyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /parliaments/{parliamentId}:
    get:
      tags: [Institutions]
      summary: Get a parliament/legislature
      operationId: getParliament
      security: []
      parameters:
        - name: parliamentId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /parliaments/roles:
    get:
      tags: [Institutions]
      summary: List parliament roles
      operationId: listParliamentRoles
      security: []
      responses:
        '200': { $ref: '#/components/responses/Success' }

  # ===========================================================================
  # REPORTING
  # ===========================================================================
  /issue-categories:
    get:
      tags: [Reporting]
      summary: List issue categories (taxonomy)
      operationId: listIssueCategories
      security: []
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /issue-categories/{categoryId}:
    get:
      tags: [Reporting]
      summary: Get an issue category
      operationId: getIssueCategory
      security: []
      parameters:
        - name: categoryId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { $ref: '#/components/responses/Success' }

  /reports:
    post:
      tags: [Reporting]
      summary: File an issue report (T2; sensitive categories allow anonymous)
      description: >
        The M-MVP core action (UC-D01). Requires **T2**; on a sensitive category the
        service relaxes to T1 and suppresses reporter linkage (anonymity, D-Q1). Gated on
        tier only — never on a token balance (integrity fence, D18). Accepts an
        `Idempotency-Key` to make retries safe.
      operationId: fileReport
      parameters:
        - { $ref: '#/components/parameters/RequiredTierT2' }
        - { $ref: '#/components/parameters/IdempotencyKey' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FileReportDto' }
      responses:
        '201':
          description: data = ReportDto.
          content:
            application/json:
