      operationId: analyticsVerificationFunnel
      responses:
        '200': { $ref: '#/components/responses/Success' }

# =============================================================================
# COMPONENTS
# =============================================================================
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Stateless JWT access token (ADR-0007/0011), ~15 min TTL. Obtain via `/auth/signup`
        or `/auth/login/*` and rotate via `/auth/refresh`. The token carries a tier claim,
        but the **live tier is re-resolved server-side** per request — never trusted from the
        claim (MF-2). Public reference reads require no token.
    ussdSharedSecret:
      type: apiKey
      in: header
      name: X-Ussd-Secret
      description: >
        Fail-closed shared secret authenticating the USSD aggregator on `/ussd/gateway`
        (server-to-server; not a user credential). Header name is configurable.

  # ---------------------------------------------------------------------------
  # Reusable parameters
  # ---------------------------------------------------------------------------
  parameters:
    Page:
      name: page
      in: query
      required: false
      description: Zero-based page index.
      schema: { type: integer, minimum: 0, default: 0 }
    Size:
      name: size
      in: query
      required: false
      description: Page size (default 20, capped at 100).
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Sort:
      name: sort
      in: query
      required: false
      description: Sort expression `field,asc|desc`.
      schema: { type: string, example: createdAt,desc }
    Query:
      name: q
      in: query
      required: false
      description: Free-text search.
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >
        Client-supplied key making create/submit retries safe (reports, signatures, OTP,
        payments). Stored in Redis with a TTL; a replay returns the original result.
      schema: { type: string }
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: Optimistic-concurrency version for updates; a stale version yields `409 CONFLICT`.
      schema: { type: string }
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      description: Response language. Default `sw` (Swahili); `en` for English.
      schema: { type: string, enum: [sw, en], default: sw }
    PublicId:
      name: publicId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RegionId:
      name: regionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RepresentativeId:
      name: representativeId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ReportId:
      name: reportId
      in: path
      required: true
      schema: { type: string, format: uuid }
    UserPublicId:
      name: userPublicId
      in: path
      required: true
      schema: { type: string, format: uuid }
    # The following are documentation-only markers: the actual gate is the server-side
    # @RequiresTier aspect, not a request header. They make the required tier visible in
    # the operation. Clients do NOT send them.
    RequiredTierT1:
      name: x-required-tier
      in: header
      required: false
      description: "Documentation marker — this action requires live tier T1 (enforced server-side)."
      schema: { type: string, enum: [T1], default: T1 }
    RequiredTierT2:
      name: x-required-tier
      in: header
      required: false
      description: "Documentation marker — this action requires live tier T2 (enforced server-side)."
      schema: { type: string, enum: [T2], default: T2 }
    RequiredTierT3:
      name: x-required-tier
      in: header
      required: false
      description: "Documentation marker — this binding action requires live tier T3 (enforced server-side)."
      schema: { type: string, enum: [T3], default: T3 }

  # ---------------------------------------------------------------------------
  # Reusable responses (all carry the ApiResponse envelope)
  # ---------------------------------------------------------------------------
  responses:
    Success:
      description: Successful response (data shape varies by endpoint; see the *Dto schemas).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiResponse' }
    ValidationError:
      description: Bean-validation failure — data = ApiError with `code=VALIDATION_FAILED` + field `errors[]`.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            statusCode: 400
            message: "Uthibitishaji umeshindikana."
            data: { code: VALIDATION_FAILED, errors: [ { field: phone, code: NotBlank, message: "Namba ya simu inahitajika." } ] }
            timestamp: "2026-06-24T09:00:00Z"
    Unauthenticated:
      description: No / invalid token — data.code = UNAUTHENTICATED.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated but not permitted (RBAC) — data.code = FORBIDDEN.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TierTooLow:
      description: Live trust tier below the action's floor — data.code = TIER_TOO_LOW (HTTP 403).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    OutOfScope:
      description: Action outside the caller's electoral/area/category scope — data.code = OUT_OF_SCOPE (403).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ConflictOfInterest:
      description: Self-action blocked (rate/answer/resolve/moderate self or own work) — data.code = CONFLICT_OF_INTEREST (403).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource absent / not in the caller's view — data.code = NOT_FOUND (404).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Optimistic-lock / uniqueness / state conflict — data.code = CONFLICT (409).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    DuplicateIdentity:
      description: National/voter-ID dedup violation (one person = one account) — data.code = DUPLICATE_IDENTITY (409).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: Rate / velocity / quota exceeded — data.code = RATE_LIMITED (429).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ---------------------------------------------------------------------------
  # Schemas — the envelope, error model, enums, and representative request DTOs.
  # The `data` payload shape (the *Dto returned) is endpoint-specific; the live
  # springdoc spec carries the exhaustive generated payload schemas.
  # ---------------------------------------------------------------------------
  schemas:

    ApiResponse:
      type: object
      description: >
        The single envelope wrapping EVERY response (success and error). `data` holds the
        endpoint payload on success, or an ApiError on failure. ARCHITECTURE.md §5.1.
      required: [success, statusCode, message, timestamp]
      properties:
        success:
          type: boolean
        statusCode:
          type: integer
          description: Integer HTTP status (200, 201, 400, 403, 404, 409, 429, 500…).
          example: 200
        message:
          type: string
          description: Localised human text (Swahili default, English via Accept-Language).
          example: Imefaulu
        data:
          description: On success the payload; on error an ApiError. Omitted when null.
        meta:
          oneOf:
            - { $ref: '#/components/schemas/PageMeta' }
            - { type: 'null' }
          description: Pagination metadata; null/omitted when not paginated.
        timestamp:
          type: string
          format: date-time
          example: "2026-06-24T09:00:00Z"

    ErrorResponse:
      type: object
      description: The ApiResponse shape on an error — `data` is an ApiError and `success=false`.
      required: [success, statusCode, message, data, timestamp]
      properties:
        success: { type: boolean, example: false }
        statusCode: { type: integer, example: 403 }
        message: { type: string, example: "Kiwango chako cha uthibitisho ni cha chini." }
        data: { $ref: '#/components/schemas/ApiError' }
        timestamp: { type: string, format: date-time }

    ApiError:
      type: object
      description: Structured error payload carried in `data` on every error response.
      required: [code]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        errors:
          type: array
          description: Field-level validation failures; present only for VALIDATION_FAILED.
          items: { $ref: '#/components/schemas/ErrorDetail' }

    ErrorDetail:
      type: object
      properties:
        field: { type: string, nullable: true, description: Rejected field path, or null for object-level errors. }
        code: { type: string, description: Stable machine code for the violated constraint (e.g. NotBlank). }
        message: { type: string, description: Localised description of the violation. }

    ErrorCode:
      type: string
      description: >
        Stable, language-independent machine error code clients branch on (never on
        `message`). Several codes share an HTTP status — that is why this code lives at
        `data.code`. ARCHITECTURE.md §5.2 / common.error.ErrorCode.
      enum:
        - VALIDATION_FAILED
        - BAD_REQUEST
        - UNAUTHENTICATED
        - FORBIDDEN
        - TIER_TOO_LOW
        - OUT_OF_SCOPE
        - CONFLICT_OF_INTEREST
        - NOT_FOUND
        - CONFLICT
        - DUPLICATE_IDENTITY
        - MFA_REQUIRED
        - RATE_LIMITED
        - INTERNAL_ERROR
        - SERVICE_UNAVAILABLE

    PageMeta:
      type: object
      properties:
        page: { type: integer, example: 0 }
        size: { type: integer, example: 20 }
        total: { type: integer, format: int64, example: 137 }
        totalPages: { type: integer, example: 7 }

    TrustTier:
      type: string
      enum: [T0, T1, T2, T3]
      description: >
        T0 guest; T1 phone/OTP; T2 complete profile + verified contact; T3 NIDA/voter-ID
        verified (operator-assisted). Resolved live server-side.

    # --- Auth request DTOs ---
    OtpRequestDto:
      type: object
      required: [phone]
      properties:
        phone: { type: string, description: E.164 phone, e.g. +255700000001., example: "+255700000001" }
    VerifyOtpDto:
      type: object
      required: [challengeId, code]
      properties:
        challengeId: { type: string, format: uuid }
        code: { type: string, description: One-time code; never returned by any endpoint., example: "123456" }
    PasswordLoginDto:
      type: object
      required: [accountKey, password]
      properties:
        accountKey: { type: string, description: Phone (E.164) or email. }
        password: { type: string, format: password }
    TotpLoginDto:
      type: object
      required: [mfaToken, totp]
      properties:
        mfaToken: { type: string, description: The MFA_CHALLENGE token from /auth/login/password. }
        totp: { type: string, description: 6-digit TOTP code., example: "012345" }
    RefreshRequestDto:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }
    TotpCodeDto:
      type: object
      required: [totp]
      properties:
        totp: { type: string, example: "012345" }
    EmailOtpRequestDto:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    # --- Profile/identity request DTOs ---
    UpdateProfileDto:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        dateOfBirth: { type: string, format: date }
        gender: { type: string }
        nationality: { type: string }
    SubmitVerificationDto:
      type: object
      required: [idType, idNo, fullName]
      properties:
        idType: { type: string, enum: [NATIONAL_ID, VOTER_ID], description: NIDA national ID or NEC voter ID. }
        idNo: { type: string, description: "PII — field-encrypted at rest, never echoed, never logged or in analytics." }
        fullName: { type: string }
        evidenceRef: { type: string, nullable: true, description: Optional uploaded-evidence media reference. }
    AddLocationDto:
      type: object
      required: [wardId]
      properties:
        wardId: { type: string, format: uuid, description: The pinned ward; admin + electoral chains are derived server-side. }
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }
        isPrimary: { type: boolean, default: false }
        label: { type: string, nullable: true }

    # --- Reporting request DTOs ---
    FileReportDto:
      type: object
      required: [categoryId, description]
      properties:
        categoryId: { type: string, format: uuid }
        description: { type: string }
        wardId: { type: string, format: uuid, nullable: true }
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }
        visibility: { type: string, enum: [PUBLIC, PRIVATE], default: PUBLIC }
        anonymous: { type: boolean, default: false, description: Honoured only for sensitive categories. }
        mediaRefs:
          type: array
          items: { type: string, format: uuid }
    AddCommentDto:
      type: object
      required: [message]
      properties:
        message: { type: string }
    ConfirmResolutionDto:
      type: object
      required: [confirmed]
      properties:
        confirmed: { type: boolean, description: true = CONFIRMED, false = DISPUTED. }
        reason: { type: string, nullable: true }

    # --- Engagement / accountability request DTOs ---
    CreatePetitionRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string }
        body: { type: string }
        constituencyId: { type: string, format: uuid, nullable: true, description: Scope; binding to a constituency requires electoral match to sign. }
    CreateRatingDto:
      type: object
      required: [representativeId, score]
      properties:
        representativeId: { type: string, format: uuid }
        score: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }

    # --- Communications request DTOs ---
    PublishAnnouncementRequest:
      type: object
      required: [title, body]
      properties:
        title: { type: string }
        body: { type: string }
        audienceAreaIds:
          type: array
          items: { type: string, format: uuid }
        audienceRole: { type: string, nullable: true }
        categoryId: { type: string, format: uuid, nullable: true }
    FollowRequest:
      type: object
      required: [sourceType, sourceId]
      properties:
        sourceType: { type: string, description: e.g. REPRESENTATIVE, RESPONDER, CATEGORY, AREA. }
        sourceId: { type: string, format: uuid }

    # --- Moderation / media / admin / ussd request DTOs ---
    FlagContentRequest:
      type: object
      required: [subjectType, subjectId, reason]
      properties:
        subjectType: { type: string, description: e.g. REPORT, COMMENT, ANNOUNCEMENT, QUESTION. }
        subjectId: { type: string, format: uuid }
        reason: { type: string }
    UploadRequest:
      type: object
      required: [contentType, sizeBytes]
      properties:
        contentType: { type: string, example: image/jpeg }
        sizeBytes: { type: integer, format: int64 }
        filename: { type: string, nullable: true }
    GrantRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [CITIZEN, ORGANIZATION_MEMBER, ORGANIZATION_ADMIN, REPRESENTATIVE, RESPONDER_AGENT, RESPONDER_ADMIN, MODERATOR, ADMIN, ROOT]
        areaIds:
          type: array
          description: Scope restriction for scoped roles (responder/area-official).
          items: { type: string, format: uuid }
        categoryIds:
          type: array
          items: { type: string, format: uuid }
        constituencyId: { type: string, format: uuid, nullable: true }
    UssdGatewayRequest:
      type: object
      description: Aggregator-shaped USSD session payload (field names vary by aggregator).
      required: [sessionId, msisdn]
      properties:
        sessionId: { type: string }
        msisdn: { type: string, description: Caller MSISDN (E.164). }
        text: { type: string, description: Accumulated keypress string for the session. }
        serviceCode: { type: string, nullable: true }
